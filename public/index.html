<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Craft</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen">
      <div class="auth-container">
        <h1>Craft</h1>
        <p class="subtitle">One workspace. No clutter.</p>

        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
          <button class="auth-tab" onclick="switchTab('register')">Create Account</button>
        </div>

        <div id="login-form" class="auth-form">
          <input type="email" id="login-email" placeholder="Email" autocomplete="email">
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
          <button onclick="login()" class="btn-primary">Sign In</button>
        </div>

        <div id="register-form" class="auth-form hidden">
          <input type="email" id="reg-email" placeholder="Email" autocomplete="email">
          <input type="password" id="reg-password" placeholder="Password" autocomplete="new-password">
          <input type="text" id="reg-code" placeholder="Referral code (optional)">
          <button onclick="register()" class="btn-primary">Get Started</button>
        </div>

        <p id="auth-error" class="error-text"></p>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-screen" class="screen hidden">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <span id="workspace-name">My Workspace</span>
          <button onclick="createPage()" class="btn-icon" title="New page">+</button>
        </div>
        <div id="page-tree" class="page-tree"></div>
        <div class="sidebar-footer">
          <div class="user-info">
            <span id="user-email"></span>
            <span id="plan-badge" class="badge">Free</span>
          </div>
          <button onclick="logout()" class="btn-text">Sign Out</button>
        </div>
      </aside>

      <!-- Editor -->
      <main id="editor">
        <div id="editor-header">
          <div class="page-icon" id="page-icon" contenteditable="true">📄</div>
          <h1 id="page-title" contenteditable="true" placeholder="Untitled">Untitled</h1>
        </div>
        <div id="blocks-container"></div>
        <div id="add-block" onclick="addBlock()">+ Add a block</div>
      </main>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
