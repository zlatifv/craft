<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - Craft</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #fafafa; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; text-align: center; }
    h2 { margin-top: 0; }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
    a { color: #000; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="status">Verifying...</h2>
    <p id="message">Please wait.</p>
    <a href="/" id="loginLink" class="hidden">Go to Login</a>
  </div>

  <script>
    const API = '/api';
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    async function verify() {
      if (!token) {
        document.getElementById('status').textContent = 'Invalid Link';
        document.getElementById('status').className = 'error';
        document.getElementById('message').textContent = 'No verification token found.';
        return;
      }

      const res = await fetch(`${API}/verify/${token}`);
      const data = await res.json();

      if (data.success) {
        document.getElementById('status').textContent = 'Email Verified!';
        document.getElementById('status').className = 'success';
        document.getElementById('message').textContent = 'Your account is active. You can now log in.';
        document.getElementById('loginLink').classList.remove('hidden');
      } else {
        document.getElementById('status').textContent = 'Verification Failed';
        document.getElementById('status').className = 'error';
        document.getElementById('message').textContent = data.error || 'This link is invalid or expired.';
      }
    }

    verify();
  </script>
</body>
</html>
